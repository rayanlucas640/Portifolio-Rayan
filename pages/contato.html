<!DOCTYPE html>
<html>

<head>
    <title>Meu contato</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
    <h1>Portifolio de Rayan</h1>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="sobre.html">Sobre</a>
        <a href="projetos.html">Projeto</a>
        <a href="contato.html">Contato</a>
    </nav>
</header>

<section class="contato">
            <h2>Me Envie uma mensagem!</h2>
            <!-- Início do Formulário -->
             <form>
                <!-- Campo nome -->
                 <label for="nome">Seu nome: </label>
                 <input type="text" required id="nome" placeholder="Digite seu nome">
                <br><br>
                 <!-- Campo e-mail -->
                 <label for="email">Seu e-mail: </label>
                 <input type="email" required id="email" placeholder="Digite seu e-mail">
                <br><br> <!-- Quebra de linha - pula -->
                 <!-- Campo mensagem -->
                 <label for="mensagem">Mensagem </label>
                 <textarea rows="5" required id="mensagem"></textarea>
                <br><br>
                 <button type="submit">Enviar</button>
            </form>
        </section>

    <footer>
    <p>® 2026 - Rayan / Portifolio pessoal</p>
</footer>
</body>
</html>
